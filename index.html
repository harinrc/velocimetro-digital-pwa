<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050608" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#050608" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#050608" id="meta-theme-color">
    <meta name="msapplication-navbutton-color" content="#050608" id="meta-nav-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="color-scheme" content="dark">
    <style>
        html, body {
            background: #050608;
            color-scheme: dark;
        }
    </style>
    <title>Velocímetro PWA</title>

    <!-- SEO -->
    <meta name="description" content="Velocímetro digital deportivo con GPS, alertas de velocidad, mapa en tiempo real y clima. Funciona sin internet.">
    <meta name="author" content="harinrc">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Facebook, WhatsApp, Telegram, LinkedIn…) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Velocímetro Deportivo PWA">
    <meta property="og:title" content="Velocímetro Deportivo PWA">
    <meta property="og:description" content="Velocímetro digital con GPS, alertas, mapa en tiempo real y clima. Instalable y 100% offline.">
    <meta property="og:url" content="https://harinrc.github.io/velocimetro-digital-pwa/">
    <meta property="og:image" content="https://harinrc.github.io/velocimetro-digital-pwa/velocimetro.jpeg">
    <meta property="og:image:secure_url" content="https://harinrc.github.io/velocimetro-digital-pwa/velocimetro.jpeg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:alt" content="Icono de Velocímetro Deportivo PWA">
    <meta property="og:locale" content="es_ES">

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Velocímetro Deportivo PWA">
    <meta name="twitter:description" content="Velocímetro digital con GPS, alertas, mapa en tiempo real y clima. Instalable y 100% offline.">
    <meta name="twitter:image" content="https://harinrc.github.io/velocimetro-digital-pwa/twitter-image.png">
    <meta name="twitter:image:alt" content="Icono de Velocímetro Deportivo PWA">

    <!-- Icono y PWA -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg">
    <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">

</head>
<body>

    <div class="app-container mode-sport">
        <header class="status-bar">
            <span class="gps-status" id="gps-status"><span class="dot"></span> GPS: Listo</span>
            <div class="status-right">
                <span class="time" id="clock">00:00:00</span>
                <button type="button" class="install-btn" id="install-btn" aria-label="Instalar aplicación" hidden>Instalar</button>
                <button type="button" class="orientation-btn" id="orientation-btn" aria-label="Cambiar orientación">Horizontal</button>
                <button type="button" class="reload-btn" id="reload-btn" aria-label="Recargar aplicación">Recargar</button>
            </div>
        </header>

        <main class="gauge-container">
            
            <svg class="gauge" viewBox="0 0 200 200">
                <path class="gauge-bg" id="gauge-bg" d="" pathLength="500" />
                <path class="gauge-progress" id="gauge-progress" d="" pathLength="500" />
                <g class="gauge-labels" id="gauge-labels"></g>
                
                <line class="needle" x1="100" y1="100" x2="100" y2="35" id="needle" />
                <circle class="needle-center" cx="100" cy="100" r="6" />
            </svg>

            <div class="digital-display">
                <div class="speed-box">
                    <span class="current-speed" id="speed-text">0</span>
                    <span class="unit">km/h</span>
                </div>
                
                <div class="limit-indicator" id="limit-box">
                    <span class="limit-label">LÍMITE</span>
                    <span class="limit-value" id="limit-value">40</span>
                </div>
            </div>
        </main>

        <footer class="controls-panel">
            <button type="button" class="panel-handle" id="panel-handle" aria-label="Expandir o reducir panel de acciones" aria-expanded="true">
                <span class="panel-handle-bar"></span>
            </button>

            <div class="weather-location-strip" id="weather-strip">
                <div class="weather-info">
                    <span class="weather-icon" id="weather-icon">🌡️</span>
                    <span class="weather-temp" id="weather-temp">--°C</span>
                </div>
                <div class="location-info">
                    <span class="location-pin">📍</span>
                    <span class="location-text" id="location-text">Buscando ubicación...</span>
                </div>
                <span class="refresh-age" id="refresh-age">Clima -- · Ubicación --</span>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Máximo</span>
                    <span class="stat-value" id="max-speed">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Promedio</span>
                    <span class="stat-value" id="avg-speed">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Estado</span>
                    <span class="stat-value" id="net-status">Offline</span>
                </div>
            </div>

            <section class="map-card" aria-label="Mapa en tiempo real">
                <div class="map-head">
                    <div class="map-title-group">
                        <span class="map-title">Mapa en tiempo real</span>
                        <span class="map-location-tag" id="map-location-tag"></span>
                    </div>
                    <button type="button" id="map-center-btn" class="map-center-btn">Centrar</button>
                </div>
                <div id="mini-map" class="mini-map" role="img" aria-label="Mapa de ubicación actual"></div>
            </section>

            <div class="setup-row">
                <label for="limit-input">Ajustar Límite:</label>
                <input type="number" id="limit-input" value="40" min="10" max="120">
            </div>

            <div class="setup-row max-speed-row">
                <label for="max-speed-btn">Escala Máxima:</label>
                <div class="max-speed-actions">
                    <span class="max-scale-value" id="max-speed-scale">120 km/h</span>
                    <button type="button" class="max-speed-btn" id="max-speed-btn">Personalizar</button>
                </div>
            </div>

            <div class="mode-row" aria-label="Selector de modo visual">
                <span class="mode-label">Modo Visual</span>
                <div class="mode-picker" role="group" aria-label="Seleccionar modo visual">
                    <button type="button" class="mode-btn" data-mode="street">Street</button>
                    <button type="button" class="mode-btn active" data-mode="sport">Sport</button>
                    <button type="button" class="mode-btn" data-mode="track">Track</button>
                </div>
            </div>

            <div class="action-row">
                <button type="button" class="floating-btn" id="floating-btn">Musica</button>
                <button class="btn-start" id="btn-action">INICIAR</button>
            </div>
        </footer>

        <section class="music-player" id="music-player" aria-label="Reproductor de musica offline" hidden>
            <div class="music-player-head" id="music-player-head">
                <span class="music-player-title">Reproductor Offline</span>
                <button type="button" class="music-close-btn" id="music-close-btn" aria-label="Cerrar reproductor" title="Cerrar">
                    <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 6L18 18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                        <path d="M18 6L6 18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                    </svg>
                </button>
            </div>

            <div class="music-track-wrap">
                <div class="music-track-main">
                    <div class="music-cover" id="music-cover" aria-label="Caratula de la cancion">
                        <span class="music-cover-fallback" id="music-cover-fallback">♪</span>
                        <img id="music-cover-image" alt="Caratula de la cancion" hidden>
                    </div>
                    <div class="music-meta">
                        <div class="music-track-name" id="music-track-name">Sin canciones cargadas</div>
                        <div class="music-track-artist" id="music-track-artist">Artista desconocido</div>
                        <div class="music-track-album" id="music-track-album">Album desconocido</div>
                    </div>
                </div>
                <div class="music-time-row">
                    <span id="music-time-current">00:00</span>
                    <span id="music-time-total">00:00</span>
                </div>
                <input type="range" id="music-seek" class="music-seek" min="0" max="100" value="0" step="0.1" aria-label="Barra de progreso">
            </div>

            <div class="music-controls">
                <button type="button" id="music-prev" aria-label="Anterior" title="Anterior">
                    <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 6v12" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                        <path d="M17 6L9 12l8 6V6Z"></path>
                    </svg>
                </button>
                <button type="button" class="music-play-btn" id="music-play" aria-label="Reproducir o pausar" title="Play/Pausa">
                    <svg class="music-icon music-icon-play" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 6L18 12L8 18V6Z"></path>
                    </svg>
                    <svg class="music-icon music-icon-pause" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 6H10V18H7V6Z"></path>
                        <path d="M14 6H17V18H14V6Z"></path>
                    </svg>
                </button>
                <button type="button" id="music-next" aria-label="Siguiente" title="Siguiente">
                    <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M16 6v12" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                        <path d="M7 6L15 12l-8 6V6Z"></path>
                    </svg>
                </button>
            </div>

            <div class="music-options">
                <button type="button" id="music-shuffle" aria-label="Aleatorio" title="Aleatorio">
                    <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 7h4l4 5-4 5H4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        <path d="M14 7h3l3-3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        <path d="M14 17h3l3 3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </button>
                <button type="button" id="music-repeat" aria-label="Repeticion" title="Repetir">
                    <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 7h10a3 3 0 0 1 3 3v1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        <path d="M17 5l3 3-3 3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        <path d="M17 17H7a3 3 0 0 1-3-3v-1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        <path d="M7 19l-3-3 3-3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </button>
                <button type="button" id="music-load" aria-label="Cargar musica del dispositivo" title="Cargar musica">
                    <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 7h6l2 2h8v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7Z"></path>
                    </svg>
                </button>
                <button type="button" id="music-reset" aria-label="Reiniciar musica" title="Reiniciar musica">
                    <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 7h16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                        <path d="M10 7V5h4v2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                        <path d="M6 7l1 12h10l1-12" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </button>
            </div>

            <div class="music-playlist" id="music-playlist" aria-label="Lista de canciones cargadas">
                <button type="button" class="music-playlist-item empty" disabled>No hay canciones cargadas</button>
            </div>

            <input type="file" id="music-file-input" accept="audio/*" multiple hidden>
            <audio id="music-audio" preload="metadata"></audio>
        </section>

        <button type="button" class="music-fab" id="music-fab" aria-label="Abrir reproductor de musica">
            <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5a7 7 0 1 0 0 14a7 7 0 0 0 0-14Zm0 5a2 2 0 1 1 0 4a2 2 0 0 1 0-4Z"></path>
            </svg>
            <span>Musica</span>
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
