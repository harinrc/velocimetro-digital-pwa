<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050608" id="meta-theme-color">
    <meta name="msapplication-navbutton-color" content="#050608" id="meta-nav-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="color-scheme" content="dark">
    <title>Velocímetro PWA</title>
    <link rel="stylesheet" href="styles.css">
        <link rel="manifest" href="manifest.json">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">

</head>
<body>

    <div class="app-container mode-sport">
        <header class="status-bar">
            <span class="gps-status" id="gps-status"><span class="dot"></span> GPS: Listo</span>
            <div class="status-right">
                <span class="time" id="clock">00:00</span>
                <button type="button" class="orientation-btn" id="orientation-btn" aria-label="Cambiar orientación">Horizontal</button>
                <button type="button" class="reload-btn" id="reload-btn" aria-label="Recargar aplicación">Recargar</button>
            </div>
        </header>

        <main class="gauge-container">
            
            <svg class="gauge" viewBox="0 0 200 200">
                <circle class="gauge-bg" cx="100" cy="100" r="80" />
                <circle class="gauge-progress" cx="100" cy="100" r="80" id="gauge-progress" />
                <g class="gauge-labels" id="gauge-labels"></g>
                
                <line class="needle" x1="100" y1="100" x2="100" y2="35" id="needle" />
                <circle class="needle-center" cx="100" cy="100" r="6" />
            </svg>

            <div class="digital-display">
                <div class="speed-box">
                    <span class="current-speed" id="speed-text">0</span>
                    <span class="unit">km/h</span>
                </div>
                
                <div class="limit-indicator" id="limit-box">
                    <span class="limit-label">LÍMITE</span>
                    <span class="limit-value" id="limit-value">40</span>
                </div>
            </div>
        </main>

        <footer class="controls-panel">
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Máximo</span>
                    <span class="stat-value" id="max-speed">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Promedio</span>
                    <span class="stat-value" id="avg-speed">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Estado</span>
                    <span class="stat-value" id="net-status">Offline</span>
                </div>
            </div>

            <section class="map-card" aria-label="Mapa en tiempo real">
                <div class="map-head">
                    <span class="map-title">Mapa en tiempo real</span>
                    <button type="button" id="map-center-btn" class="map-center-btn">Centrar</button>
                </div>
                <div id="mini-map" class="mini-map" role="img" aria-label="Mapa de ubicación actual"></div>
            </section>

            <div class="setup-row">
                <label for="limit-input">Ajustar Límite:</label>
                <input type="number" id="limit-input" value="40" min="10" max="120">
            </div>

            <div class="setup-row max-speed-row">
                <label for="max-speed-btn">Escala Máxima:</label>
                <div class="max-speed-actions">
                    <span class="max-scale-value" id="max-speed-scale">120 km/h</span>
                    <button type="button" class="max-speed-btn" id="max-speed-btn">Personalizar</button>
                </div>
            </div>

            <div class="mode-row" aria-label="Selector de modo visual">
                <span class="mode-label">Modo Visual</span>
                <div class="mode-picker" role="group" aria-label="Seleccionar modo visual">
                    <button type="button" class="mode-btn" data-mode="street">Street</button>
                    <button type="button" class="mode-btn active" data-mode="sport">Sport</button>
                    <button type="button" class="mode-btn" data-mode="track">Track</button>
                </div>
            </div>

            <div class="action-row">
                <button type="button" class="floating-btn" id="floating-btn">Ventana flotante</button>
                <button class="btn-start" id="btn-action">INICIAR</button>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
